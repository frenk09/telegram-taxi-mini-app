version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: taxi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taxi_app
      POSTGRES_USER: taxi
      POSTGRES_PASSWORD: taxi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: taxi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
